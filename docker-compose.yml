name: betcrm

services:
  postgres:
    image: postgres:16-alpine
    container_name: betcrm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    # Sem ports expostos: só rede interna

  redis:
    image: redis:7-alpine
    container_name: betcrm_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
    networks:
      - backend

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: betcrm_api
    restart: unless-stopped
    env_file: .env
    command: >
      gunicorn betcrm.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 2
      --timeout 60
      --access-logfile -
      --error-logfile -
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - backend

  celery_worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: betcrm_celery_worker
    restart: unless-stopped
    env_file: .env
    command: >
      celery -A betcrm worker
      -l info
      -Q default,events,messaging,flows
      --concurrency=4
      --max-tasks-per-child=1000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  celery_beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: betcrm_celery_beat
    restart: unless-stopped
    env_file: .env
    command: >
      celery -A betcrm beat
      -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  flower:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: betcrm_flower
    restart: unless-stopped
    env_file: .env
    command: >
      celery -A betcrm flower
      --port=5555
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    depends_on:
      - redis
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: betcrm_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN:-yourdomain.com}
      NODE_ENV: production
    networks:
      - frontend
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: betcrm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/certs:/etc/letsencrypt:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - api
      - frontend
    networks:
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
